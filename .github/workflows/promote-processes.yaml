name: Promote Processes Image

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Full image with digest (e.g., myacr.azurecr.io/raptor/processes-dev@sha256:...)"
        required: true
      sourceRepo:
        description: "GitHub owner/repo of the processes source (auto-detected if empty)"
        required: false
  repository_dispatch:
    types: [ processes-image-promote ]

jobs:
  promote:
    uses: ./.github/workflows/_promote-image.yaml
    secrets: inherit
    with:
      service-key:    processes
      service-suffix: proc
      service-label:  Processes
      image:       ${{ github.event.client_payload.image || inputs.image }}
      source-repo: ${{ github.event.client_payload.sourceRepo || inputs.sourceRepo || '' }}