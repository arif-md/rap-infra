name: _Promote Image (reusable)
# Internal reusable workflow — called by promote-backend.yaml, promote-frontend.yaml, promote-processes.yaml.
# Do not trigger directly.
#
# Architecture: image promotion never runs azd up.
# - promote-to-* jobs use az containerapp update (direct Container App image update).
# - If the Container App does not exist the job fails with a clear message.
# - To provision a new environment first, run promote-infrastructure.yaml or provision-infrastructure.yaml.
#
# Bug fixes applied vs the old per-service promote workflows:
# 1. az acr import uses --platform linux/amd64: only the runnable image is imported (not attestation manifests).
# 2. Digest is resolved from the TARGET ACR after import, not carried from the source.
# 3. relnotes.sh receives SERVICE_REPO_READ_TOKEN derived from {SERVICE_KEY_UPPER}_REPO_READ_TOKEN.
# 4. No azd in promote-to-* jobs (azd up never runs during image promotion).

on:
  workflow_call:
    inputs:
      service-key:
        description: "Service key (lowercase): backend | frontend | processes"
        required: true
        type: string
      service-suffix:
        description: "Container App name suffix: be | fe | proc"
        required: true
        type: string
      service-label:
        description: "Human-readable service name for emails/summaries (e.g. Backend)"
        required: true
        type: string
      image:
        description: "Full source image with digest (e.g., myacr.azurecr.io/raptor/backend-dev@sha256:...)"
        required: true
        type: string
      source-repo:
        description: "GitHub owner/repo of the service source code (for release notes). Auto-detected if empty."
        required: false
        type: string
        default: ""

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # PLAN — determine which environments to promote to
  # ────────────────────────────────────────────────────────────────────────────
  plan:
    name: Determine promotion plan
    runs-on: ubuntu-latest
    outputs:
      srcImage: ${{ steps.resolve.outputs.srcImage }}
      srcRepo:  ${{ steps.resolve.outputs.srcRepo }}
      baseEnv:  ${{ steps.parse.outputs.baseEnv }}
      run_test:  ${{ steps.parse.outputs.run_test }}
      run_train: ${{ steps.parse.outputs.run_train }}
      run_prod:  ${{ steps.parse.outputs.run_prod }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          SRC_IMAGE='${{ inputs.image }}'
          SRC_REPO='${{ inputs.source-repo }}'
          if [ -z "$SRC_IMAGE" ]; then echo "::error::No source image provided." >&2; exit 1; fi
          if [ -z "$SRC_REPO" ]; then SRC_REPO='${{ github.repository }}'; fi
          echo "srcImage=$SRC_IMAGE" >> "$GITHUB_OUTPUT"
          echo "srcRepo=$SRC_REPO"  >> "$GITHUB_OUTPUT"
          echo "Source image : $SRC_IMAGE"
          echo "Source repo  : $SRC_REPO"

      - name: Parse base environment from image
        id: parse
        shell: bash
        run: |
          set -euo pipefail
          SRC_IMAGE='${{ steps.resolve.outputs.srcImage }}'
          PATH_PART="${SRC_IMAGE#*/}"
          REPO_PART="${PATH_PART%@*}"
          SERVICE_KEY='${{ inputs.service-key }}'
          PATTERN="${SERVICE_KEY}-(dev|test|train|prod)"
          if echo "$REPO_PART" | grep -qE "$PATTERN"; then
            BASE_ENV=$(printf '%s' "$REPO_PART" | sed -nE "s@.*${SERVICE_KEY}-((dev|test|train|prod)).*@\1@p")
          else
            BASE_ENV=dev
          fi
          RUN_TEST=false; RUN_TRAIN=false; RUN_PROD=false
          case "$BASE_ENV" in
            dev)   RUN_TEST=true; RUN_TRAIN=true; RUN_PROD=true;;
            test)  RUN_TRAIN=true; RUN_PROD=true;;
            train) RUN_PROD=true;;
            prod)  :;;
          esac
          echo "baseEnv=$BASE_ENV"    >> "$GITHUB_OUTPUT"
          echo "run_test=$RUN_TEST"   >> "$GITHUB_OUTPUT"
          echo "run_train=$RUN_TRAIN" >> "$GITHUB_OUTPUT"
          echo "run_prod=$RUN_PROD"   >> "$GITHUB_OUTPUT"
          echo "Base environment: $BASE_ENV"
          echo "Promote to: test=$RUN_TEST  train=$RUN_TRAIN  prod=$RUN_PROD"

  # ────────────────────────────────────────────────────────────────────────────
  # TEST — preflight notification + promotion
  # ────────────────────────────────────────────────────────────────────────────
  prepare-and-notify-test:
    name: Prepare & Notify (test)
    if: ${{ needs.plan.outputs.run_test == 'true' }}
    needs: [plan]
    runs-on: ubuntu-latest
    environment: preflight
    permissions:
      id-token: write
      contents: read
    env:
      TARGET_ENV: test
      SRC_IMAGE: ${{ needs.plan.outputs.srcImage }}
      SRC_REPO:  ${{ needs.plan.outputs.srcRepo }}
      # All three tokens available; the relnotes step picks the right one via SERVICE_KEY
      BACKEND_REPO_READ_TOKEN:   ${{ secrets.BACKEND_REPO_READ_TOKEN }}
      FRONTEND_REPO_READ_TOKEN:  ${{ secrets.FRONTEND_REPO_READ_TOKEN }}
      PROCESSES_REPO_READ_TOKEN: ${{ secrets.PROCESSES_REPO_READ_TOKEN }}
      MAIL_SERVER:   ${{ secrets.MAIL_SERVER }}
      MAIL_PORT:     ${{ secrets.MAIL_PORT }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_TO:       ${{ secrets.MAIL_TO }}
      MAIL_FROM:     ${{ secrets.MAIL_FROM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Prepare target env variables
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          TARGET_ENV='${{ env.TARGET_ENV }}'
          # preflight environment may hold TEST-scoped cross-env vars (AZURE_ACR_NAME_TEST etc.)
          # Fall back to unscoped generic vars, then to a conventional name
          ACR_NAME='${{ vars.AZURE_ACR_NAME_TEST || vars.AZURE_ACR_NAME || '' }}'
          RG='${{ vars.AZURE_RESOURCE_GROUP_TEST || vars.AZURE_RESOURCE_GROUP || '' }}'
          if [ -z "$RG" ]; then RG="rg-raptor-${TARGET_ENV}"; fi
          SUB=$(az account show --query id -o tsv 2>/dev/null || true)
          LOC=$(az group show -n "$RG" ${SUB:+--subscription "$SUB"} --query location -o tsv 2>/dev/null || true)
          [ -n "$ACR_NAME" ] && echo "acr=$ACR_NAME" >> $GITHUB_OUTPUT
          echo "rg=$RG"              >> $GITHUB_OUTPUT
          [ -n "$LOC" ] && echo "loc=$LOC" >> $GITHUB_OUTPUT
          [ -n "$SUB" ] && echo "sub=$SUB" >> $GITHUB_OUTPUT
          echo "env=$TARGET_ENV"     >> $GITHUB_OUTPUT

      - name: Capture current deployed image (before promotion)
        id: current
        shell: bash
        run: |
          set -euo pipefail
          ENV='${{ steps.prep.outputs.env }}'
          RG='${{ steps.prep.outputs.rg }}'
          SUB='${{ steps.prep.outputs.sub || secrets.AZURE_SUBSCRIPTION_ID }}'
          APP_NAME=$(echo "${ENV}-rap-${{ inputs.service-suffix }}" | tr '[:upper:]' '[:lower:]')
          az extension add -n containerapp -y >/dev/null 2>&1 || true
          CURR_IMG=$(az containerapp show -n "$APP_NAME" -g "$RG" ${SUB:+--subscription "$SUB"} \
            --query "properties.template.containers[0].image" -o tsv 2>/dev/null || true)
          CURR_DIGEST="${CURR_IMG#*@}"
          if [ "$CURR_IMG" = "$CURR_DIGEST" ]; then CURR_DIGEST=""; fi
          echo "image=$CURR_IMG"     >> $GITHUB_OUTPUT
          echo "digest=$CURR_DIGEST" >> $GITHUB_OUTPUT

      - name: Make utility scripts executable
        shell: bash
        run: chmod +x scripts/*.sh || true

      - name: Generate release notes
        id: relnotes
        shell: bash
        env:
          SRC_IMAGE:    ${{ env.SRC_IMAGE }}
          SRC_REPO:     ${{ env.SRC_REPO }}
          TARGET_ENV:   ${{ steps.prep.outputs.env }}
          RG:           ${{ steps.prep.outputs.rg }}
          SUB:          ${{ steps.prep.outputs.sub || secrets.AZURE_SUBSCRIPTION_ID }}
          TGT_ACR:      ${{ steps.prep.outputs.acr }}
          PREV_IMAGE:   ${{ steps.current.outputs.image }}
          PREV_DIGEST:  ${{ steps.current.outputs.digest }}
          COMMITS_TABLE_LIMIT: ${{ vars.COMMITS_TABLE_LIMIT || 50 }}
          BUILD_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # All three tokens are in the environment; pick the right one via SERVICE_KEY
          BACKEND_REPO_READ_TOKEN:   ${{ env.BACKEND_REPO_READ_TOKEN }}
          FRONTEND_REPO_READ_TOKEN:  ${{ env.FRONTEND_REPO_READ_TOKEN }}
          PROCESSES_REPO_READ_TOKEN: ${{ env.PROCESSES_REPO_READ_TOKEN }}
        run: |
          set -euo pipefail
          # Derive the correct read token from the service key and export as the generic name relnotes.sh expects
          SK_UPPER=$(echo '${{ inputs.service-key }}' | tr '[:lower:]' '[:upper:]')
          TOKEN_VAR="${SK_UPPER}_REPO_READ_TOKEN"
          export SERVICE_REPO_READ_TOKEN="${!TOKEN_VAR:-}"
          bash scripts/relnotes.sh

      - name: Append release notes to summary
        shell: bash
        run: |
          cat release-notes.md >> "$GITHUB_STEP_SUMMARY"
          printf '\n<!-- Rendered HTML changelog -->\n' >> "$GITHUB_STEP_SUMMARY"
          cat release-notes.html >> "$GITHUB_STEP_SUMMARY"

      - name: ACR label access diagnostics
        if: always()
        shell: bash
        env:
          SRC_IMAGE: ${{ env.SRC_IMAGE }}
        run: |
          set -euo pipefail
          TGT_ACR='${{ steps.prep.outputs.acr || '' }}'
          SRC_DOMAIN="${SRC_IMAGE%%/*}"
          SRC_REG_NAME=$(echo "$SRC_DOMAIN" | sed 's/\.azurecr\.io$//')
          echo "=== ACR label access diagnostics ==="
          if [ -n "$TGT_ACR" ]; then
            tok=$(az acr login -n "$TGT_ACR" --expose-token -o tsv --query accessToken 2>/dev/null || true)
            [ -n "$tok" ] && echo "Target ACR ($TGT_ACR): token OK" || echo "Target ACR ($TGT_ACR): token MISSING"
          fi
          stok=$(az acr login -n "$SRC_REG_NAME" --expose-token -o tsv --query accessToken 2>/dev/null || true)
          [ -n "$stok" ] && echo "Source ACR ($SRC_REG_NAME): token OK" || echo "Source ACR ($SRC_REG_NAME): token MISSING"
          echo "===================================="

      - name: Check email prerequisites
        shell: bash
        run: |
          missing=()
          for v in MAIL_SERVER MAIL_USERNAME MAIL_PASSWORD MAIL_TO; do
            [ -z "${!v:-}" ] && missing+=("$v")
          done
          [ ${#missing[@]} -gt 0 ] && echo "Email skipped. Missing: ${missing[*]}" || echo "Email prerequisites OK."

      - name: Check environment approvals (required reviewers)
        id: gate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ENV='${{ steps.prep.outputs.env }}'
          URL="https://api.github.com/repos/${{ github.repository }}/environments/${ENV}"
          JSON=$(curl -fsS -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "$URL" || true)
          COUNT=$(printf '%s' "$JSON" | jq -r '[.protection_rules[]? | select(.type=="required_reviewers") | (.reviewers // []) | length] | add // 0')
          NEED="false"; [ "${COUNT:-0}" -gt 0 ] && NEED="true"
          echo "needsApproval=$NEED" >> $GITHUB_OUTPUT

      - name: Compose email
        id: email_compose
        shell: bash
        env:
          TARGET_ENV:     ${{ steps.prep.outputs.env }}
          SRC_IMAGE:      ${{ env.SRC_IMAGE }}
          NEEDS_APPROVAL: ${{ steps.gate.outputs.needsApproval }}
          BUILD_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          NEEDS_APPROVAL=${NEEDS_APPROVAL:-false}
          if [ "$NEEDS_APPROVAL" = "true" ]; then
            SUBJECT_PREFIX="[Approval Needed]"
            INTRO="A deployment to the '<strong>${TARGET_ENV}</strong>' environment is pending approval."
          else
            SUBJECT_PREFIX="[Deployment Notice]"
            INTRO="A deployment to the '<strong>${TARGET_ENV}</strong>' environment is ready."
          fi
          SUBJECT="$SUBJECT_PREFIX Promote ${{ inputs.service-label }} to ${TARGET_ENV}"
          {
            printf "<p>%s</p>\n" "$INTRO"
            printf "<p><strong>Image:</strong> %s<br>\n<strong>Target:</strong> Azure Container Apps (%s)</p>\n" "$SRC_IMAGE" "$TARGET_ENV"
            if [ "$NEEDS_APPROVAL" = "true" ]; then
              printf "<p><a href=\"%s\">Build details</a> • <a href=\"%s\">Review &amp; approve</a></p>\n" "$BUILD_URL" "$BUILD_URL"
            else
              printf "<p><a href=\"%s\">Build details</a></p>\n" "$BUILD_URL"
            fi
            cat release-notes.html || true
          } > email.html
          { echo "subject<<EOF"; echo "$SUBJECT"; echo "EOF"
            echo "html<<EOF"; cat email.html; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Email approver/notify (optional)
        if: ${{ env.MAIL_SERVER && env.MAIL_USERNAME && env.MAIL_PASSWORD && env.MAIL_TO }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.MAIL_SERVER }}
          server_port:    ${{ env.MAIL_PORT || 587 }}
          username:       ${{ env.MAIL_USERNAME }}
          password:       ${{ env.MAIL_PASSWORD }}
          subject:        "${{ steps.email_compose.outputs.subject }}"
          to:             ${{ env.MAIL_TO }}
          from:           "${{ env.MAIL_FROM || format('github-actions@{0}', github.repository_owner) }}"
          html_body:      "${{ steps.email_compose.outputs.html }}"

  promote-to-test:
    name: Promote to test
    if: ${{ needs.plan.outputs.run_test == 'true' }}
    needs: [plan, prepare-and-notify-test]
    runs-on: ubuntu-latest
    environment: test
    permissions:
      id-token: write
      contents: read
    env:
      TARGET_ENV: test
      SRC_IMAGE:  ${{ needs.plan.outputs.srcImage }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare target env variables
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          TARGET_ENV=${TARGET_ENV}
          ACR_NAME='${{ vars.AZURE_ACR_NAME }}'
          RG='${{ vars.AZURE_RESOURCE_GROUP }}'
          if [ -z "$ACR_NAME" ] || [ -z "$RG" ]; then
            echo "::error::Missing AZURE_ACR_NAME or AZURE_RESOURCE_GROUP for '${TARGET_ENV}' environment." >&2
            echo "::error::Configure these as Variables in the GitHub Environment: ${TARGET_ENV}" >&2
            exit 1
          fi
          LOC=$(az group show -n "$RG" --query location -o tsv 2>/dev/null || true)
          if [ -z "$LOC" ]; then LOC='${{ vars.AZURE_LOCATION || '' }}'; fi
          echo "acr=$ACR_NAME" >> $GITHUB_OUTPUT
          echo "rg=$RG"        >> $GITHUB_OUTPUT
          echo "loc=$LOC"      >> $GITHUB_OUTPUT
          echo "env=$TARGET_ENV" >> $GITHUB_OUTPUT

      - name: Ensure target ACR exists
        shell: bash
        run: |
          set -euo pipefail
          ACR='${{ steps.prep.outputs.acr }}'
          ACR_RG='${{ vars.AZURE_ACR_RESOURCE_GROUP || steps.prep.outputs.rg }}'
          az acr show -n "$ACR" -g "$ACR_RG" >/dev/null 2>&1 || \
            az acr create -n "$ACR" -g "$ACR_RG" --sku Standard >/dev/null

      - name: Import image (linux/amd64) into target ACR
        id: import
        shell: bash
        run: |
          set -euo pipefail
          SRC_IMAGE='${{ env.SRC_IMAGE }}'
          ACR='${{ steps.prep.outputs.acr }}'
          TARGET_REPO="raptor/${{ inputs.service-key }}-${{ steps.prep.outputs.env }}"
          TAG="promoted-${GITHUB_RUN_ID}"

          # Resolve linux/amd64 digest from source ACR to avoid importing attestation manifests
          SRC_DOMAIN="${SRC_IMAGE%%/*}"
          SRC_ACR="${SRC_DOMAIN%.azurecr.io}"
          SRC_PATH="${SRC_IMAGE#*/}"
          SRC_REPO="${SRC_PATH%@*}"
          echo "Resolving linux/amd64 digest from source ACR: ${SRC_ACR}/${SRC_REPO}"
          AMD64_DIGEST=$(az acr manifest list-metadata -r "$SRC_ACR" -n "$SRC_REPO" \
            --query "[?architecture=='amd64' && os=='linux'] | [0].digest" -o tsv 2>/dev/null || true)
          if [ -n "$AMD64_DIGEST" ]; then
            IMPORT_SRC="${SRC_DOMAIN}/${SRC_REPO}@${AMD64_DIGEST}"
            echo "Using resolved amd64 source digest: $AMD64_DIGEST"
          else
            echo "Could not resolve amd64 manifest from source; using source image with --platform filter"
            IMPORT_SRC="$SRC_IMAGE"
          fi

          echo "Importing ${IMPORT_SRC} -> ${ACR}/${TARGET_REPO}:${TAG} (linux/amd64)"
          az acr import -n "$ACR" --source "$IMPORT_SRC" --image "$TARGET_REPO:$TAG" --platform linux/amd64

          # Resolve digest from TARGET ACR — do not carry source digest forward
          DIGEST=$(az acr manifest show-metadata -r "$ACR" -n "$TARGET_REPO:$TAG" \
            --query "digest" -o tsv 2>/dev/null || true)
          if [ -z "$DIGEST" ]; then
            echo "::error::Failed to resolve digest from target ACR after import." >&2
            exit 1
          fi
          echo "Imported linux/amd64 manifest to target: $DIGEST"
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "image=${ACR}.azurecr.io/${TARGET_REPO}@${DIGEST}" >> $GITHUB_OUTPUT

      - name: Verify Container App exists
        id: appcheck
        shell: bash
        run: |
          set -euo pipefail
          ENV='${{ steps.prep.outputs.env }}'
          RG='${{ steps.prep.outputs.rg }}'
          APP_NAME=$(echo "${ENV}-rap-${{ inputs.service-suffix }}" | tr '[:upper:]' '[:lower:]')
          echo "appName=$APP_NAME" >> $GITHUB_ENV
          az extension add -n containerapp -y >/dev/null 2>&1 || true
          if ! az containerapp show -n "$APP_NAME" -g "$RG" >/dev/null 2>&1; then
            echo "::error::Container App '$APP_NAME' does not exist in resource group '$RG'."
            echo "::error::Infrastructure must be provisioned before image promotion."
            echo "::error::Run the 'Promote Infrastructure' or 'Provision Infrastructure' workflow for '$ENV' first."
            exit 1
          fi

      - name: Update Container App image
        shell: bash
        run: |
          set -euo pipefail
          IMG='${{ steps.import.outputs.image }}'
          RG='${{ steps.prep.outputs.rg }}'
          ACR_NAME='${{ steps.prep.outputs.acr }}'
          chmod +x scripts/update-containerapp-image.sh
          ./scripts/update-containerapp-image.sh "${{ env.appName }}" "$RG" "$IMG" "$ACR_NAME" "${ACR_NAME}.azurecr.io"

      - name: Show deployment URL
        shell: bash
        run: |
          set -euo pipefail
          RG='${{ steps.prep.outputs.rg }}'
          az extension add -n containerapp -y >/dev/null 2>&1 || true
          FQDN=$(az containerapp show -n "${{ env.appName }}" -g "$RG" \
            --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || true)
          [ "$FQDN" = "null" ] && FQDN=""
          if [ -n "$FQDN" ]; then
            echo "Deployed: https://$FQDN"
            echo "### Deployed: [https://$FQDN](https://$FQDN)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Persist deployment metadata to tags
        shell: bash
        run: |
          set -euo pipefail
          RG='${{ steps.prep.outputs.rg }}'
          SUB='${{ secrets.AZURE_SUBSCRIPTION_ID }}'
          NEW_DIGEST='${{ steps.import.outputs.digest }}'
          SRC_IMAGE='${{ env.SRC_IMAGE }}'
          if [ -z "$NEW_DIGEST" ]; then echo "No digest; skipping tag update."; exit 0; fi
          SRC_DOMAIN="${SRC_IMAGE%%/*}"
          SRC_ACR="${SRC_DOMAIN%.azurecr.io}"
          SRC_PATH="${SRC_IMAGE#*/}"
          SRC_REPO="${SRC_PATH%@*}"
          NEW_SHA=$(bash "${GITHUB_WORKSPACE}/scripts/get-commit-from-image.sh" \
            "$SRC_ACR" "$SRC_REPO" "$NEW_DIGEST" 2>&1 || true)
          TAG_ARGS=("raptor.lastDigest=${NEW_DIGEST}")
          [ -n "${NEW_SHA:-}" ] && TAG_ARGS+=("raptor.lastCommit=${NEW_SHA}")
          az resource tag -n "${{ env.appName }}" -g "$RG" ${SUB:+--subscription "$SUB"} \
            --resource-type "Microsoft.App/containerApps" \
            --is-incremental \
            --tags "${TAG_ARGS[@]}" >/dev/null

  after-test:
    name: Barrier after test
    if: ${{ always() }}
    needs: [plan, promote-to-test]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Test stage complete — proceeding to train"

  # ────────────────────────────────────────────────────────────────────────────
  # TRAIN — preflight notification + promotion
  # ────────────────────────────────────────────────────────────────────────────
  prepare-and-notify-train:
    name: Prepare & Notify (train)
    if: ${{ needs.plan.outputs.run_train == 'true' }}
    needs: [plan, after-test]
    runs-on: ubuntu-latest
    environment: preflight
    permissions:
      id-token: write
      contents: read
    env:
      TARGET_ENV: train
      SRC_IMAGE: ${{ needs.plan.outputs.srcImage }}
      SRC_REPO:  ${{ needs.plan.outputs.srcRepo }}
      BACKEND_REPO_READ_TOKEN:   ${{ secrets.BACKEND_REPO_READ_TOKEN }}
      FRONTEND_REPO_READ_TOKEN:  ${{ secrets.FRONTEND_REPO_READ_TOKEN }}
      PROCESSES_REPO_READ_TOKEN: ${{ secrets.PROCESSES_REPO_READ_TOKEN }}
      MAIL_SERVER:   ${{ secrets.MAIL_SERVER }}
      MAIL_PORT:     ${{ secrets.MAIL_PORT }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_TO:       ${{ secrets.MAIL_TO }}
      MAIL_FROM:     ${{ secrets.MAIL_FROM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Prepare target env variables
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          TARGET_ENV='${{ env.TARGET_ENV }}'
          ACR_NAME='${{ vars.AZURE_ACR_NAME_TRAIN || vars.AZURE_ACR_NAME || '' }}'
          RG='${{ vars.AZURE_RESOURCE_GROUP_TRAIN || vars.AZURE_RESOURCE_GROUP || '' }}'
          if [ -z "$RG" ]; then RG="rg-raptor-${TARGET_ENV}"; fi
          SUB=$(az account show --query id -o tsv 2>/dev/null || true)
          LOC=$(az group show -n "$RG" ${SUB:+--subscription "$SUB"} --query location -o tsv 2>/dev/null || true)
          [ -n "$ACR_NAME" ] && echo "acr=$ACR_NAME" >> $GITHUB_OUTPUT
          echo "rg=$RG"          >> $GITHUB_OUTPUT
          [ -n "$LOC" ] && echo "loc=$LOC" >> $GITHUB_OUTPUT
          [ -n "$SUB" ] && echo "sub=$SUB" >> $GITHUB_OUTPUT
          echo "env=$TARGET_ENV" >> $GITHUB_OUTPUT

      - name: Capture current deployed image (before promotion)
        id: current
        shell: bash
        run: |
          set -euo pipefail
          ENV='${{ steps.prep.outputs.env }}'
          RG='${{ steps.prep.outputs.rg }}'
          SUB='${{ steps.prep.outputs.sub || secrets.AZURE_SUBSCRIPTION_ID }}'
          APP_NAME=$(echo "${ENV}-rap-${{ inputs.service-suffix }}" | tr '[:upper:]' '[:lower:]')
          az extension add -n containerapp -y >/dev/null 2>&1 || true
          CURR_IMG=$(az containerapp show -n "$APP_NAME" -g "$RG" ${SUB:+--subscription "$SUB"} \
            --query "properties.template.containers[0].image" -o tsv 2>/dev/null || true)
          CURR_DIGEST="${CURR_IMG#*@}"
          if [ "$CURR_IMG" = "$CURR_DIGEST" ]; then CURR_DIGEST=""; fi
          echo "image=$CURR_IMG"     >> $GITHUB_OUTPUT
          echo "digest=$CURR_DIGEST" >> $GITHUB_OUTPUT

      - name: Make utility scripts executable
        shell: bash
        run: chmod +x scripts/*.sh || true

      - name: Generate release notes
        id: relnotes
        shell: bash
        env:
          SRC_IMAGE:    ${{ env.SRC_IMAGE }}
          SRC_REPO:     ${{ env.SRC_REPO }}
          TARGET_ENV:   ${{ steps.prep.outputs.env }}
          RG:           ${{ steps.prep.outputs.rg }}
          SUB:          ${{ steps.prep.outputs.sub || secrets.AZURE_SUBSCRIPTION_ID }}
          TGT_ACR:      ${{ steps.prep.outputs.acr }}
          PREV_IMAGE:   ${{ steps.current.outputs.image }}
          PREV_DIGEST:  ${{ steps.current.outputs.digest }}
          COMMITS_TABLE_LIMIT: ${{ vars.COMMITS_TABLE_LIMIT || 50 }}
          BUILD_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BACKEND_REPO_READ_TOKEN:   ${{ env.BACKEND_REPO_READ_TOKEN }}
          FRONTEND_REPO_READ_TOKEN:  ${{ env.FRONTEND_REPO_READ_TOKEN }}
          PROCESSES_REPO_READ_TOKEN: ${{ env.PROCESSES_REPO_READ_TOKEN }}
        run: |
          set -euo pipefail
          SK_UPPER=$(echo '${{ inputs.service-key }}' | tr '[:lower:]' '[:upper:]')
          TOKEN_VAR="${SK_UPPER}_REPO_READ_TOKEN"
          export SERVICE_REPO_READ_TOKEN="${!TOKEN_VAR:-}"
          bash scripts/relnotes.sh

      - name: Append release notes to summary
        shell: bash
        run: |
          cat release-notes.md >> "$GITHUB_STEP_SUMMARY"
          printf '\n<!-- Rendered HTML changelog -->\n' >> "$GITHUB_STEP_SUMMARY"
          cat release-notes.html >> "$GITHUB_STEP_SUMMARY"

      - name: Check environment approvals (required reviewers)
        id: gate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ENV='${{ steps.prep.outputs.env }}'
          URL="https://api.github.com/repos/${{ github.repository }}/environments/${ENV}"
          JSON=$(curl -fsS -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "$URL" || true)
          COUNT=$(printf '%s' "$JSON" | jq -r '[.protection_rules[]? | select(.type=="required_reviewers") | (.reviewers // []) | length] | add // 0')
          NEED="false"; [ "${COUNT:-0}" -gt 0 ] && NEED="true"
          echo "needsApproval=$NEED" >> $GITHUB_OUTPUT

      - name: Compose email
        id: email_compose
        shell: bash
        env:
          TARGET_ENV:     ${{ steps.prep.outputs.env }}
          SRC_IMAGE:      ${{ env.SRC_IMAGE }}
          NEEDS_APPROVAL: ${{ steps.gate.outputs.needsApproval }}
          BUILD_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          NEEDS_APPROVAL=${NEEDS_APPROVAL:-false}
          if [ "$NEEDS_APPROVAL" = "true" ]; then
            SUBJECT_PREFIX="[Approval Needed]"
            INTRO="A deployment to the '<strong>${TARGET_ENV}</strong>' environment is pending approval."
          else
            SUBJECT_PREFIX="[Deployment Notice]"
            INTRO="A deployment to the '<strong>${TARGET_ENV}</strong>' environment is ready."
          fi
          SUBJECT="$SUBJECT_PREFIX Promote ${{ inputs.service-label }} to ${TARGET_ENV}"
          {
            printf "<p>%s</p>\n" "$INTRO"
            printf "<p><strong>Image:</strong> %s<br>\n<strong>Target:</strong> Azure Container Apps (%s)</p>\n" "$SRC_IMAGE" "$TARGET_ENV"
            if [ "$NEEDS_APPROVAL" = "true" ]; then
              printf "<p><a href=\"%s\">Build details</a> • <a href=\"%s\">Review &amp; approve</a></p>\n" "$BUILD_URL" "$BUILD_URL"
            else
              printf "<p><a href=\"%s\">Build details</a></p>\n" "$BUILD_URL"
            fi
            cat release-notes.html || true
          } > email.html
          { echo "subject<<EOF"; echo "$SUBJECT"; echo "EOF"
            echo "html<<EOF"; cat email.html; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Email approver/notify (optional)
        if: ${{ env.MAIL_SERVER && env.MAIL_USERNAME && env.MAIL_PASSWORD && env.MAIL_TO }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.MAIL_SERVER }}
          server_port:    ${{ env.MAIL_PORT || 587 }}
          username:       ${{ env.MAIL_USERNAME }}
          password:       ${{ env.MAIL_PASSWORD }}
          subject:        "${{ steps.email_compose.outputs.subject }}"
          to:             ${{ env.MAIL_TO }}
          from:           "${{ env.MAIL_FROM || format('github-actions@{0}', github.repository_owner) }}"
          html_body:      "${{ steps.email_compose.outputs.html }}"

  promote-to-train:
    name: Promote to train
    if: ${{ needs.plan.outputs.run_train == 'true' }}
    needs: [plan, prepare-and-notify-train]
    runs-on: ubuntu-latest
    environment: train
    permissions:
      id-token: write
      contents: read
    env:
      TARGET_ENV: train
      SRC_IMAGE:  ${{ needs.plan.outputs.srcImage }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare target env variables
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          TARGET_ENV=${TARGET_ENV}
          ACR_NAME='${{ vars.AZURE_ACR_NAME }}'
          RG='${{ vars.AZURE_RESOURCE_GROUP }}'
          if [ -z "$ACR_NAME" ] || [ -z "$RG" ]; then
            echo "::error::Missing AZURE_ACR_NAME or AZURE_RESOURCE_GROUP for '${TARGET_ENV}' environment." >&2
            exit 1
          fi
          LOC=$(az group show -n "$RG" --query location -o tsv 2>/dev/null || true)
          if [ -z "$LOC" ]; then LOC='${{ vars.AZURE_LOCATION || '' }}'; fi
          echo "acr=$ACR_NAME"  >> $GITHUB_OUTPUT
          echo "rg=$RG"         >> $GITHUB_OUTPUT
          echo "loc=$LOC"       >> $GITHUB_OUTPUT
          echo "env=$TARGET_ENV" >> $GITHUB_OUTPUT

      - name: Ensure target ACR exists
        shell: bash
        run: |
          set -euo pipefail
          ACR='${{ steps.prep.outputs.acr }}'
          ACR_RG='${{ vars.AZURE_ACR_RESOURCE_GROUP || steps.prep.outputs.rg }}'
          az acr show -n "$ACR" -g "$ACR_RG" >/dev/null 2>&1 || \
            az acr create -n "$ACR" -g "$ACR_RG" --sku Standard >/dev/null

      - name: Import image (linux/amd64) into target ACR
        id: import
        shell: bash
        run: |
          set -euo pipefail
          SRC_IMAGE='${{ env.SRC_IMAGE }}'
          ACR='${{ steps.prep.outputs.acr }}'
          TARGET_REPO="raptor/${{ inputs.service-key }}-${{ steps.prep.outputs.env }}"
          TAG="promoted-${GITHUB_RUN_ID}"

          SRC_DOMAIN="${SRC_IMAGE%%/*}"
          SRC_ACR="${SRC_DOMAIN%.azurecr.io}"
          SRC_PATH="${SRC_IMAGE#*/}"
          SRC_REPO="${SRC_PATH%@*}"
          echo "Resolving linux/amd64 digest from source ACR: ${SRC_ACR}/${SRC_REPO}"
          AMD64_DIGEST=$(az acr manifest list-metadata -r "$SRC_ACR" -n "$SRC_REPO" \
            --query "[?architecture=='amd64' && os=='linux'] | [0].digest" -o tsv 2>/dev/null || true)
          if [ -n "$AMD64_DIGEST" ]; then
            IMPORT_SRC="${SRC_DOMAIN}/${SRC_REPO}@${AMD64_DIGEST}"
            echo "Using resolved amd64 source digest: $AMD64_DIGEST"
          else
            echo "Could not resolve amd64 manifest from source; using source image with --platform filter"
            IMPORT_SRC="$SRC_IMAGE"
          fi

          echo "Importing ${IMPORT_SRC} -> ${ACR}/${TARGET_REPO}:${TAG} (linux/amd64)"
          az acr import -n "$ACR" --source "$IMPORT_SRC" --image "$TARGET_REPO:$TAG" --platform linux/amd64

          DIGEST=$(az acr manifest show-metadata -r "$ACR" -n "$TARGET_REPO:$TAG" \
            --query "digest" -o tsv 2>/dev/null || true)
          if [ -z "$DIGEST" ]; then
            echo "::error::Failed to resolve digest from target ACR after import." >&2
            exit 1
          fi
          echo "Imported linux/amd64 manifest to target: $DIGEST"
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "image=${ACR}.azurecr.io/${TARGET_REPO}@${DIGEST}" >> $GITHUB_OUTPUT

      - name: Verify Container App exists
        shell: bash
        run: |
          set -euo pipefail
          ENV='${{ steps.prep.outputs.env }}'
          RG='${{ steps.prep.outputs.rg }}'
          APP_NAME=$(echo "${ENV}-rap-${{ inputs.service-suffix }}" | tr '[:upper:]' '[:lower:]')
          echo "appName=$APP_NAME" >> $GITHUB_ENV
          az extension add -n containerapp -y >/dev/null 2>&1 || true
          if ! az containerapp show -n "$APP_NAME" -g "$RG" >/dev/null 2>&1; then
            echo "::error::Container App '$APP_NAME' does not exist in resource group '$RG'."
            echo "::error::Run 'Promote Infrastructure' or 'Provision Infrastructure' for '$ENV' first."
            exit 1
          fi

      - name: Update Container App image
        shell: bash
        run: |
          set -euo pipefail
          IMG='${{ steps.import.outputs.image }}'
          RG='${{ steps.prep.outputs.rg }}'
          ACR_NAME='${{ steps.prep.outputs.acr }}'
          chmod +x scripts/update-containerapp-image.sh
          ./scripts/update-containerapp-image.sh "${{ env.appName }}" "$RG" "$IMG" "$ACR_NAME" "${ACR_NAME}.azurecr.io"

      - name: Show deployment URL
        shell: bash
        run: |
          set -euo pipefail
          RG='${{ steps.prep.outputs.rg }}'
          az extension add -n containerapp -y >/dev/null 2>&1 || true
          FQDN=$(az containerapp show -n "${{ env.appName }}" -g "$RG" \
            --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || true)
          [ "$FQDN" = "null" ] && FQDN=""
          if [ -n "$FQDN" ]; then
            echo "Deployed: https://$FQDN"
            echo "### Deployed: [https://$FQDN](https://$FQDN)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Persist deployment metadata to tags
        shell: bash
        run: |
          set -euo pipefail
          RG='${{ steps.prep.outputs.rg }}'
          SUB='${{ secrets.AZURE_SUBSCRIPTION_ID }}'
          NEW_DIGEST='${{ steps.import.outputs.digest }}'
          SRC_IMAGE='${{ env.SRC_IMAGE }}'
          if [ -z "$NEW_DIGEST" ]; then echo "No digest; skipping tag update."; exit 0; fi
          SRC_DOMAIN="${SRC_IMAGE%%/*}"
          SRC_ACR="${SRC_DOMAIN%.azurecr.io}"
          SRC_PATH="${SRC_IMAGE#*/}"
          SRC_REPO="${SRC_PATH%@*}"
          NEW_SHA=$(bash "${GITHUB_WORKSPACE}/scripts/get-commit-from-image.sh" \
            "$SRC_ACR" "$SRC_REPO" "$NEW_DIGEST" 2>&1 || true)
          TAG_ARGS=("raptor.lastDigest=${NEW_DIGEST}")
          [ -n "${NEW_SHA:-}" ] && TAG_ARGS+=("raptor.lastCommit=${NEW_SHA}")
          az resource tag -n "${{ env.appName }}" -g "$RG" ${SUB:+--subscription "$SUB"} \
            --resource-type "Microsoft.App/containerApps" \
            --is-incremental \
            --tags "${TAG_ARGS[@]}" >/dev/null

  after-train:
    name: Barrier after train
    if: ${{ always() }}
    needs: [plan, promote-to-train]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Train stage complete — proceeding to prod"

  # ────────────────────────────────────────────────────────────────────────────
  # PROD — preflight notification + promotion
  # ────────────────────────────────────────────────────────────────────────────
  prepare-and-notify-prod:
    name: Prepare & Notify (prod)
    if: ${{ needs.plan.outputs.run_prod == 'true' }}
    needs: [plan, after-train]
    runs-on: ubuntu-latest
    environment: preflight
    permissions:
      id-token: write
      contents: read
    env:
      TARGET_ENV: prod
      SRC_IMAGE: ${{ needs.plan.outputs.srcImage }}
      SRC_REPO:  ${{ needs.plan.outputs.srcRepo }}
      BACKEND_REPO_READ_TOKEN:   ${{ secrets.BACKEND_REPO_READ_TOKEN }}
      FRONTEND_REPO_READ_TOKEN:  ${{ secrets.FRONTEND_REPO_READ_TOKEN }}
      PROCESSES_REPO_READ_TOKEN: ${{ secrets.PROCESSES_REPO_READ_TOKEN }}
      MAIL_SERVER:   ${{ secrets.MAIL_SERVER }}
      MAIL_PORT:     ${{ secrets.MAIL_PORT }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_TO:       ${{ secrets.MAIL_TO }}
      MAIL_FROM:     ${{ secrets.MAIL_FROM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Prepare target env variables
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          TARGET_ENV='${{ env.TARGET_ENV }}'
          ACR_NAME='${{ vars.AZURE_ACR_NAME_PROD || vars.AZURE_ACR_NAME || '' }}'
          RG='${{ vars.AZURE_RESOURCE_GROUP_PROD || vars.AZURE_RESOURCE_GROUP || '' }}'
          if [ -z "$RG" ]; then RG="rg-raptor-${TARGET_ENV}"; fi
          SUB=$(az account show --query id -o tsv 2>/dev/null || true)
          LOC=$(az group show -n "$RG" ${SUB:+--subscription "$SUB"} --query location -o tsv 2>/dev/null || true)
          [ -n "$ACR_NAME" ] && echo "acr=$ACR_NAME" >> $GITHUB_OUTPUT
          echo "rg=$RG"          >> $GITHUB_OUTPUT
          [ -n "$LOC" ] && echo "loc=$LOC" >> $GITHUB_OUTPUT
          [ -n "$SUB" ] && echo "sub=$SUB" >> $GITHUB_OUTPUT
          echo "env=$TARGET_ENV" >> $GITHUB_OUTPUT

      - name: Capture current deployed image (before promotion)
        id: current
        shell: bash
        run: |
          set -euo pipefail
          ENV='${{ steps.prep.outputs.env }}'
          RG='${{ steps.prep.outputs.rg }}'
          SUB='${{ steps.prep.outputs.sub || secrets.AZURE_SUBSCRIPTION_ID }}'
          APP_NAME=$(echo "${ENV}-rap-${{ inputs.service-suffix }}" | tr '[:upper:]' '[:lower:]')
          az extension add -n containerapp -y >/dev/null 2>&1 || true
          CURR_IMG=$(az containerapp show -n "$APP_NAME" -g "$RG" ${SUB:+--subscription "$SUB"} \
            --query "properties.template.containers[0].image" -o tsv 2>/dev/null || true)
          CURR_DIGEST="${CURR_IMG#*@}"
          if [ "$CURR_IMG" = "$CURR_DIGEST" ]; then CURR_DIGEST=""; fi
          echo "image=$CURR_IMG"     >> $GITHUB_OUTPUT
          echo "digest=$CURR_DIGEST" >> $GITHUB_OUTPUT

      - name: Make utility scripts executable
        shell: bash
        run: chmod +x scripts/*.sh || true

      - name: Generate release notes
        id: relnotes
        shell: bash
        env:
          SRC_IMAGE:    ${{ env.SRC_IMAGE }}
          SRC_REPO:     ${{ env.SRC_REPO }}
          TARGET_ENV:   ${{ steps.prep.outputs.env }}
          RG:           ${{ steps.prep.outputs.rg }}
          SUB:          ${{ steps.prep.outputs.sub || secrets.AZURE_SUBSCRIPTION_ID }}
          TGT_ACR:      ${{ steps.prep.outputs.acr }}
          PREV_IMAGE:   ${{ steps.current.outputs.image }}
          PREV_DIGEST:  ${{ steps.current.outputs.digest }}
          COMMITS_TABLE_LIMIT: ${{ vars.COMMITS_TABLE_LIMIT || 50 }}
          BUILD_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BACKEND_REPO_READ_TOKEN:   ${{ env.BACKEND_REPO_READ_TOKEN }}
          FRONTEND_REPO_READ_TOKEN:  ${{ env.FRONTEND_REPO_READ_TOKEN }}
          PROCESSES_REPO_READ_TOKEN: ${{ env.PROCESSES_REPO_READ_TOKEN }}
        run: |
          set -euo pipefail
          SK_UPPER=$(echo '${{ inputs.service-key }}' | tr '[:lower:]' '[:upper:]')
          TOKEN_VAR="${SK_UPPER}_REPO_READ_TOKEN"
          export SERVICE_REPO_READ_TOKEN="${!TOKEN_VAR:-}"
          bash scripts/relnotes.sh

      - name: Append release notes to summary
        shell: bash
        run: |
          cat release-notes.md >> "$GITHUB_STEP_SUMMARY"
          printf '\n<!-- Rendered HTML changelog -->\n' >> "$GITHUB_STEP_SUMMARY"
          cat release-notes.html >> "$GITHUB_STEP_SUMMARY"

      - name: Check environment approvals (required reviewers)
        id: gate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ENV='${{ steps.prep.outputs.env }}'
          URL="https://api.github.com/repos/${{ github.repository }}/environments/${ENV}"
          JSON=$(curl -fsS -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "$URL" || true)
          COUNT=$(printf '%s' "$JSON" | jq -r '[.protection_rules[]? | select(.type=="required_reviewers") | (.reviewers // []) | length] | add // 0')
          NEED="false"; [ "${COUNT:-0}" -gt 0 ] && NEED="true"
          echo "needsApproval=$NEED" >> $GITHUB_OUTPUT

      - name: Compose email
        id: email_compose
        shell: bash
        env:
          TARGET_ENV:     ${{ steps.prep.outputs.env }}
          SRC_IMAGE:      ${{ env.SRC_IMAGE }}
          NEEDS_APPROVAL: ${{ steps.gate.outputs.needsApproval }}
          BUILD_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          NEEDS_APPROVAL=${NEEDS_APPROVAL:-false}
          if [ "$NEEDS_APPROVAL" = "true" ]; then
            SUBJECT_PREFIX="[Approval Needed]"
            INTRO="A deployment to the '<strong>${TARGET_ENV}</strong>' environment is pending approval."
          else
            SUBJECT_PREFIX="[Deployment Notice]"
            INTRO="A deployment to the '<strong>${TARGET_ENV}</strong>' environment is ready."
          fi
          SUBJECT="$SUBJECT_PREFIX Promote ${{ inputs.service-label }} to ${TARGET_ENV}"
          {
            printf "<p>%s</p>\n" "$INTRO"
            printf "<p><strong>Image:</strong> %s<br>\n<strong>Target:</strong> Azure Container Apps (%s)</p>\n" "$SRC_IMAGE" "$TARGET_ENV"
            if [ "$NEEDS_APPROVAL" = "true" ]; then
              printf "<p><a href=\"%s\">Build details</a> • <a href=\"%s\">Review &amp; approve</a></p>\n" "$BUILD_URL" "$BUILD_URL"
            else
              printf "<p><a href=\"%s\">Build details</a></p>\n" "$BUILD_URL"
            fi
            cat release-notes.html || true
          } > email.html
          { echo "subject<<EOF"; echo "$SUBJECT"; echo "EOF"
            echo "html<<EOF"; cat email.html; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Email approver/notify (optional)
        if: ${{ env.MAIL_SERVER && env.MAIL_USERNAME && env.MAIL_PASSWORD && env.MAIL_TO }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.MAIL_SERVER }}
          server_port:    ${{ env.MAIL_PORT || 587 }}
          username:       ${{ env.MAIL_USERNAME }}
          password:       ${{ env.MAIL_PASSWORD }}
          subject:        "${{ steps.email_compose.outputs.subject }}"
          to:             ${{ env.MAIL_TO }}
          from:           "${{ env.MAIL_FROM || format('github-actions@{0}', github.repository_owner) }}"
          html_body:      "${{ steps.email_compose.outputs.html }}"

  promote-to-prod:
    name: Promote to prod
    if: ${{ needs.plan.outputs.run_prod == 'true' }}
    needs: [plan, prepare-and-notify-prod]
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    env:
      TARGET_ENV: prod
      SRC_IMAGE:  ${{ needs.plan.outputs.srcImage }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare target env variables
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          TARGET_ENV=${TARGET_ENV}
          ACR_NAME='${{ vars.AZURE_ACR_NAME }}'
          RG='${{ vars.AZURE_RESOURCE_GROUP }}'
          if [ -z "$ACR_NAME" ] || [ -z "$RG" ]; then
            echo "::error::Missing AZURE_ACR_NAME or AZURE_RESOURCE_GROUP for '${TARGET_ENV}' environment." >&2
            exit 1
          fi
          LOC=$(az group show -n "$RG" --query location -o tsv 2>/dev/null || true)
          if [ -z "$LOC" ]; then LOC='${{ vars.AZURE_LOCATION || '' }}'; fi
          echo "acr=$ACR_NAME"  >> $GITHUB_OUTPUT
          echo "rg=$RG"         >> $GITHUB_OUTPUT
          echo "loc=$LOC"       >> $GITHUB_OUTPUT
          echo "env=$TARGET_ENV" >> $GITHUB_OUTPUT

      - name: Ensure target ACR exists
        shell: bash
        run: |
          set -euo pipefail
          ACR='${{ steps.prep.outputs.acr }}'
          ACR_RG='${{ vars.AZURE_ACR_RESOURCE_GROUP || steps.prep.outputs.rg }}'
          az acr show -n "$ACR" -g "$ACR_RG" >/dev/null 2>&1 || \
            az acr create -n "$ACR" -g "$ACR_RG" --sku Standard >/dev/null

      - name: Import image (linux/amd64) into target ACR
        id: import
        shell: bash
        run: |
          set -euo pipefail
          SRC_IMAGE='${{ env.SRC_IMAGE }}'
          ACR='${{ steps.prep.outputs.acr }}'
          TARGET_REPO="raptor/${{ inputs.service-key }}-${{ steps.prep.outputs.env }}"
          TAG="promoted-${GITHUB_RUN_ID}"

          SRC_DOMAIN="${SRC_IMAGE%%/*}"
          SRC_ACR="${SRC_DOMAIN%.azurecr.io}"
          SRC_PATH="${SRC_IMAGE#*/}"
          SRC_REPO="${SRC_PATH%@*}"
          echo "Resolving linux/amd64 digest from source ACR: ${SRC_ACR}/${SRC_REPO}"
          AMD64_DIGEST=$(az acr manifest list-metadata -r "$SRC_ACR" -n "$SRC_REPO" \
            --query "[?architecture=='amd64' && os=='linux'] | [0].digest" -o tsv 2>/dev/null || true)
          if [ -n "$AMD64_DIGEST" ]; then
            IMPORT_SRC="${SRC_DOMAIN}/${SRC_REPO}@${AMD64_DIGEST}"
            echo "Using resolved amd64 source digest: $AMD64_DIGEST"
          else
            echo "Could not resolve amd64 manifest from source; using source image with --platform filter"
            IMPORT_SRC="$SRC_IMAGE"
          fi

          echo "Importing ${IMPORT_SRC} -> ${ACR}/${TARGET_REPO}:${TAG} (linux/amd64)"
          az acr import -n "$ACR" --source "$IMPORT_SRC" --image "$TARGET_REPO:$TAG" --platform linux/amd64

          DIGEST=$(az acr manifest show-metadata -r "$ACR" -n "$TARGET_REPO:$TAG" \
            --query "digest" -o tsv 2>/dev/null || true)
          if [ -z "$DIGEST" ]; then
            echo "::error::Failed to resolve digest from target ACR after import." >&2
            exit 1
          fi
          echo "Imported linux/amd64 manifest to target: $DIGEST"
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "image=${ACR}.azurecr.io/${TARGET_REPO}@${DIGEST}" >> $GITHUB_OUTPUT

      - name: Verify Container App exists
        shell: bash
        run: |
          set -euo pipefail
          ENV='${{ steps.prep.outputs.env }}'
          RG='${{ steps.prep.outputs.rg }}'
          APP_NAME=$(echo "${ENV}-rap-${{ inputs.service-suffix }}" | tr '[:upper:]' '[:lower:]')
          echo "appName=$APP_NAME" >> $GITHUB_ENV
          az extension add -n containerapp -y >/dev/null 2>&1 || true
          if ! az containerapp show -n "$APP_NAME" -g "$RG" >/dev/null 2>&1; then
            echo "::error::Container App '$APP_NAME' does not exist in resource group '$RG'."
            echo "::error::Run 'Promote Infrastructure' or 'Provision Infrastructure' for '$ENV' first."
            exit 1
          fi

      - name: Update Container App image
        shell: bash
        run: |
          set -euo pipefail
          IMG='${{ steps.import.outputs.image }}'
          RG='${{ steps.prep.outputs.rg }}'
          ACR_NAME='${{ steps.prep.outputs.acr }}'
          chmod +x scripts/update-containerapp-image.sh
          ./scripts/update-containerapp-image.sh "${{ env.appName }}" "$RG" "$IMG" "$ACR_NAME" "${ACR_NAME}.azurecr.io"

      - name: Show deployment URL
        shell: bash
        run: |
          set -euo pipefail
          RG='${{ steps.prep.outputs.rg }}'
          az extension add -n containerapp -y >/dev/null 2>&1 || true
          FQDN=$(az containerapp show -n "${{ env.appName }}" -g "$RG" \
            --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || true)
          [ "$FQDN" = "null" ] && FQDN=""
          if [ -n "$FQDN" ]; then
            echo "Deployed: https://$FQDN"
            echo "### Deployed: [https://$FQDN](https://$FQDN)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Persist deployment metadata to tags
        shell: bash
        run: |
          set -euo pipefail
          RG='${{ steps.prep.outputs.rg }}'
          SUB='${{ secrets.AZURE_SUBSCRIPTION_ID }}'
          NEW_DIGEST='${{ steps.import.outputs.digest }}'
          SRC_IMAGE='${{ env.SRC_IMAGE }}'
          if [ -z "$NEW_DIGEST" ]; then echo "No digest; skipping tag update."; exit 0; fi
          SRC_DOMAIN="${SRC_IMAGE%%/*}"
          SRC_ACR="${SRC_DOMAIN%.azurecr.io}"
          SRC_PATH="${SRC_IMAGE#*/}"
          SRC_REPO="${SRC_PATH%@*}"
          NEW_SHA=$(bash "${GITHUB_WORKSPACE}/scripts/get-commit-from-image.sh" \
            "$SRC_ACR" "$SRC_REPO" "$NEW_DIGEST" 2>&1 || true)
          TAG_ARGS=("raptor.lastDigest=${NEW_DIGEST}")
          [ -n "${NEW_SHA:-}" ] && TAG_ARGS+=("raptor.lastCommit=${NEW_SHA}")
          az resource tag -n "${{ env.appName }}" -g "$RG" ${SUB:+--subscription "$SUB"} \
            --resource-type "Microsoft.App/containerApps" \
            --is-incremental \
            --tags "${TAG_ARGS[@]}" >/dev/null
