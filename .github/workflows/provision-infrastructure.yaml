name: Provision Infrastructure

on:
  workflow_dispatch:
    inputs:
      targetEnv:
        description: "GitHub Environment name to run under (e.g., dev/test/train/prod)"
        required: false
        default: "dev"
  push:
    branches: [ main ]
    paths:
      - 'main.bicep'
      - 'main.parameters.json'
      - 'modules/**'
      - 'shared/**'
      - 'scripts/**'
      - '!app/**'  # Exclude app-specific Bicep files
      # Note: Workflow files (.github/workflows/**) are intentionally NOT included in paths
      # Best practices:
      # 1. Avoid unintended auto-deployment - Workflow changes should be tested deliberately
      # 2. Prevent breaking changes - A broken workflow could fail silently or cause deployment issues
      # 3. Require explicit testing - Workflow changes should be reviewed and tested separately
      # 4. Avoid infinite loops - If a workflow modifies itself, it could create loops
      # 5. GitHub's design - GitHub treats workflow changes specially for security reasons

jobs:
  provision:
    runs-on: ubuntu-latest
    environment: ${{ inputs.targetEnv || vars.DEFAULT_GITHUB_ENV || 'dev' }}
    outputs:
      resource_group: ${{ env.AZURE_RESOURCE_GROUP }}
    concurrency:
      group: azure-deployment-${{ inputs.targetEnv || vars.DEFAULT_GITHUB_ENV || 'dev' }}
      cancel-in-progress: false
    env:
      # Use environment-scoped variables; define these per GitHub Environment (test/train/prod)
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME || 'dev' }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
      AZURE_ACR_RESOURCE_GROUP: ${{ vars.AZURE_ACR_RESOURCE_GROUP }}
      KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME || '' }}
    permissions:
      id-token: write   # for OIDC
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Azure Developer CLI (preferred)
        uses: Azure/setup-azd@v2
        with:
          version: latest
        continue-on-error: true

      - name: Ensure azd installed (fallback)
        run: |
          if ! command -v azd >/dev/null 2>&1; then
            echo "setup-azd failed; installing via script"
            curl -fsSL https://aka.ms/install-azd.sh | bash
            echo "$HOME/.azure-dev/bin" >> $GITHUB_PATH
          fi
          azd version

      - name: azd auth login (OIDC via provider)
        run: |
          echo "Authenticating azd using GitHub OIDC provider"
          azd auth login \
            --client-id "${{ secrets.AZURE_CLIENT_ID }}" \
            --tenant-id "${{ secrets.AZURE_TENANT_ID }}" \
            --federated-credential-provider github

      - name: Verify az/azd auth
        shell: bash
        run: |
          set -euo pipefail
          az account show -o none
          az account get-access-token -o none
          command -v azd >/dev/null 2>&1
          azd version

      - name: "Sanity: environment variables (resolved)"
        shell: bash
        run: |
          echo "Using GitHub Environment: ${{ job.environment.name }}"
          echo "AZURE_ENV_NAME=$AZURE_ENV_NAME"
          echo "AZURE_RESOURCE_GROUP=$AZURE_RESOURCE_GROUP"
          echo "AZURE_ACR_NAME=$AZURE_ACR_NAME"
          echo "AZURE_ACR_RESOURCE_GROUP=$AZURE_ACR_RESOURCE_GROUP"

      - name: Ensure AZURE_ENV_NAME default
        run: |
          if [ -z "$AZURE_ENV_NAME" ]; then
            NAME="${GITHUB_REF_NAME:-dev}"
            SAFE=$(echo "$NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g')
            echo "AZURE_ENV_NAME=$SAFE" >> $GITHUB_ENV
            echo "Using fallback AZURE_ENV_NAME: $SAFE"
          else
            echo "Using provided AZURE_ENV_NAME: $AZURE_ENV_NAME"
          fi

      - name: Prepare azd environment
        uses: ./.github/actions/setup-azd-env
        with:
          azure-env-name: ${{ env.AZURE_ENV_NAME }}
          azure-resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          all-vars-json: ${{ toJson(vars) }}
          all-secrets-json: ${{ toJson(secrets) }}

      - name: Ensure ACR exists (preprovision)
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/ensure-acr.sh
          ./scripts/ensure-acr.sh

      - name: Ensure DNS Zone exists (preprovision)
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/ensure-dns-zone.sh

      - name: Resolve images (preprovision)
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/resolve-images.sh
          ./scripts/resolve-images.sh

      - name: Validate image vs ACR binding (guard)
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/validate-acr-binding.sh
          ./scripts/validate-acr-binding.sh

      - name: Provision infrastructure (azd provision)
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🏗️  Provisioning shared infrastructure and all services"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "This workflow provisions:"
          echo "  - Azure Container Registry (if not exists)"
          echo "  - Azure Key Vault (if not exists)"
          echo "  - Container Apps Environment"
          echo "  - Log Analytics Workspace"
          echo "  - Application Insights"
          echo "  - Frontend Container App (dev-rap-fe)"
          echo "  - Backend Container App (dev-rap-be)"
          echo "  - Processes Container App (dev-rap-proc)"
          echo "  - Azure SQL Server and Database"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          # azd provision runs: preprovision hooks → Bicep → postprovision hooks.
          # postprovision (bind-custom-domain-tls.sh) attempts DNS sync + TLS binding.
          # azd deploy is intentionally NOT run — container images are built and
          # published by the frontend/backend CI pipelines, not from source here.
          azd provision --no-prompt --environment "$AZURE_ENV_NAME"

      - name: Bind custom domain + TLS (explicit retry)
        # Runs after azd provision even if the postprovision hook failed (e.g. cert
        # provisioning timed out after 15 min). STEP 1 detects an existing SniEnabled
        # binding and exits 0 immediately — so this is a no-op when everything went
        # right. If the postprovision hook timed out, this step picks up the in-progress
        # cert (Pending certs are no longer deleted — they're waited on) and completes
        # the binding. The job only fails if TLS binding ultimately cannot be completed.
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          set -euo pipefail
          CUSTOM_DOMAIN=$(azd env get-value CUSTOM_DOMAIN_NAME 2>/dev/null || true)
          if [ -z "$CUSTOM_DOMAIN" ]; then
            echo "CUSTOM_DOMAIN_NAME not set — skipping TLS binding step."
            exit 0
          fi
          echo "Running bind-custom-domain-tls.sh for $CUSTOM_DOMAIN ..."
          chmod +x scripts/bind-custom-domain-tls.sh
          ./scripts/bind-custom-domain-tls.sh

      # SQL permissions are now granted automatically by the Bicep deployment script
      # (modules/sql-role-assignments.bicep) — no manual extraction needed.

      - name: Show deployment summary
        if: success()
        shell: bash
        run: |
          echo "✅ Infrastructure provisioning completed successfully!"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦  All provisioned resources in $AZURE_RESOURCE_GROUP"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          az resource list -g "$AZURE_RESOURCE_GROUP" \
            --query "sort_by([].{Type:type, Name:name, State:provisioningState}, &Type)" \
            -o table 2>/dev/null || true

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🌐  Container Apps endpoints"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          APPS=$(az containerapp list -g "$AZURE_RESOURCE_GROUP" \
            --query "[].{Name:name,Status:properties.provisioningState,Fqdn:properties.configuration.ingress.fqdn}" \
            -o tsv 2>/dev/null || true)
          if [ -n "$APPS" ]; then
            echo "$APPS" | while IFS=$'\t' read -r name status fqdn; do
              echo "  $name  →  ${fqdn:-(no ingress)}  [$status]"
            done
          fi

          # CAE info — internal flag tells us if custom domain is accessible
          CAE=$(az containerapp env list -g "$AZURE_RESOURCE_GROUP" \
            --query "[0].{Name:name,IP:properties.staticIp,Internal:properties.vnetConfiguration.internal,Domain:properties.defaultDomain}" \
            -o tsv 2>/dev/null || true)
          if [ -n "$CAE" ]; then
            echo ""
            echo "Container Apps Environment:"
            echo "$CAE" | while IFS=$'\t' read -r name ip internal domain; do
              echo "  $name  staticIp=$ip  internal=$internal"
              echo "  defaultDomain=$domain"
              if [ "$internal" = "true" ]; then
                echo "  ⚠️  CAE is INTERNAL (private IP only) — custom domain will NOT be publicly reachable"
              else
                echo "  ✅  CAE is PUBLIC — custom domain is reachable from internet"
              fi
            done
          fi

          # VNet (conditional)
          VNET=$(az network vnet list -g "$AZURE_RESOURCE_GROUP" \
            --query "[].{Name:name,AddressSpace:addressSpace.addressPrefixes[0]}" \
            -o tsv 2>/dev/null || true)
          if [ -n "$VNET" ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔒  VNet integration resources"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "VNet: $VNET"
            echo ""
            echo "Private Endpoints:"
            az network private-endpoint list -g "$AZURE_RESOURCE_GROUP" \
              --query "[].{Name:name,State:provisioningState,Subnet:subnet.id}" \
              -o table 2>/dev/null || echo "  (none)"
            echo ""
            echo "Private DNS Zones:"
            az network private-dns zone list -g "$AZURE_RESOURCE_GROUP" \
              --query "[].{Zone:name,State:provisioningState}" \
              -o table 2>/dev/null || echo "  (none)"
          fi

          # SQL (conditional)
          SQL=$(az sql server list -g "$AZURE_RESOURCE_GROUP" \
            --query "[].{Server:name,FQDN:fullyQualifiedDomainName}" \
            -o tsv 2>/dev/null || true)
          if [ -n "$SQL" ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🗄️  SQL resources"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "$SQL" | while IFS=$'\t' read -r server fqdn; do
              echo "  Server: $server  ($fqdn)"
              az sql db list --server "$server" -g "$AZURE_RESOURCE_GROUP" \
                --query "[].{DB:name,SKU:currentSku.name,State:status}" -o table 2>/dev/null || true
            done
          fi

          # OIDC redirect URIs for manual update
          BACKEND_FQDN=$(az containerapp list -g "$AZURE_RESOURCE_GROUP" \
            --query "[?ends_with(name,'-be')].properties.configuration.ingress.fqdn | [0]" \
            -o tsv 2>/dev/null || true)
          FRONTEND_FQDN=$(az containerapp list -g "$AZURE_RESOURCE_GROUP" \
            --query "[?ends_with(name,'-fe')].properties.configuration.ingress.fqdn | [0]" \
            -o tsv 2>/dev/null || true)
          if [ -n "$BACKEND_FQDN" ] && [ "$BACKEND_FQDN" != "null" ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔑  OIDC / AAD redirect URIs (update your IdP registrations)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  OIDC callback : https://$BACKEND_FQDN/login/oauth2/code/oidc-provider"
            echo "  AAD callback  : https://$BACKEND_FQDN/login/oauth2/code/azure-ad"
            if [ -n "$FRONTEND_FQDN" ] && [ "$FRONTEND_FQDN" != "null" ]; then
              echo "  Post-logout   : https://$FRONTEND_FQDN/sign-in?logout=success"
            fi
          fi

          {
            echo "### ✅ Infrastructure Provisioning Complete"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Environment** | \`$AZURE_ENV_NAME\` |"
            echo "| **Resource Group** | \`$AZURE_RESOURCE_GROUP\` |"
            if [ -n "$BACKEND_FQDN" ] && [ "$BACKEND_FQDN" != "null" ]; then
              echo "| **Backend FQDN** | \`$BACKEND_FQDN\` |"
            fi
            if [ -n "$FRONTEND_FQDN" ] && [ "$FRONTEND_FQDN" != "null" ]; then
              echo "| **Frontend FQDN** | \`$FRONTEND_FQDN\` |"
            fi
            echo ""
            if [ -n "$BACKEND_FQDN" ] && [ "$BACKEND_FQDN" != "null" ]; then
              echo "#### 🔐 OIDC / AAD URIs to update in your IdP"
              echo "| Purpose | URI |"
              echo "|---------|-----|"
              echo "| OIDC callback | \`https://$BACKEND_FQDN/login/oauth2/code/oidc-provider\` |"
              echo "| AAD callback  | \`https://$BACKEND_FQDN/login/oauth2/code/azure-ad\` |"
              if [ -n "$FRONTEND_FQDN" ] && [ "$FRONTEND_FQDN" != "null" ]; then
                echo "| Post-logout   | \`https://$FRONTEND_FQDN/sign-in?logout=success\` |"
              fi
            fi
            echo ""
            echo "#### 🔐 SQL Database Permissions"
            echo "✅ Granted automatically by deployment script (id-sqladmin-* identity)."
            if [ -n "${{ vars.SQL_AD_GROUP_NAME || '' }}" ]; then
              echo "AD group \`${{ vars.SQL_AD_GROUP_NAME }}\` granted db_owner for portal admin access."
            fi
          } >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Infrastructure provisioning failed!"
          echo "Check the logs above for error details."
          echo ""
          echo "Common issues:"
          echo "  - Deployment stack in non-terminal state (another deployment running)"
          echo "  - Invalid Bicep configuration"
          echo "  - Missing permissions"
          echo "  - Resource quota limits"
