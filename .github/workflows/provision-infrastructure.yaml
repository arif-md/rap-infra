name: Provision Infrastructure

on:
  workflow_dispatch:
    inputs:
      targetEnv:
        description: "GitHub Environment name to run under (e.g., dev/test/train/prod)"
        required: false
        default: "dev"
  push:
    branches: [ main ]
    paths:
      - 'main.bicep'
      - 'main.parameters.json'
      - 'modules/**'
      - 'shared/**'
      - 'scripts/**'
      - '!app/**'  # Exclude app-specific Bicep files
      # Note: Workflow files (.github/workflows/**) are intentionally NOT included in paths
      # Best practices:
      # 1. Avoid unintended auto-deployment - Workflow changes should be tested deliberately
      # 2. Prevent breaking changes - A broken workflow could fail silently or cause deployment issues
      # 3. Require explicit testing - Workflow changes should be reviewed and tested separately
      # 4. Avoid infinite loops - If a workflow modifies itself, it could create loops
      # 5. GitHub's design - GitHub treats workflow changes specially for security reasons

jobs:
  provision:
    runs-on: ubuntu-latest
    environment: ${{ inputs.targetEnv || vars.DEFAULT_GITHUB_ENV || 'dev' }}
    outputs:
      resource_group: ${{ env.AZURE_RESOURCE_GROUP }}
    concurrency:
      group: azure-deployment-${{ inputs.targetEnv || vars.DEFAULT_GITHUB_ENV || 'dev' }}
      cancel-in-progress: false
    env:
      # Use environment-scoped variables; define these per GitHub Environment (test/train/prod)
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME || 'dev' }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
      AZURE_ACR_RESOURCE_GROUP: ${{ vars.AZURE_ACR_RESOURCE_GROUP }}
      KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME || '' }}
    permissions:
      id-token: write   # for OIDC
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Azure Developer CLI (preferred)
        uses: Azure/setup-azd@v2
        with:
          version: latest
        continue-on-error: true

      - name: Ensure azd installed (fallback)
        run: |
          if ! command -v azd >/dev/null 2>&1; then
            echo "setup-azd failed; installing via script"
            curl -fsSL https://aka.ms/install-azd.sh | bash
            echo "$HOME/.azure-dev/bin" >> $GITHUB_PATH
          fi
          azd version

      - name: azd auth login (OIDC via provider)
        run: |
          echo "Authenticating azd using GitHub OIDC provider"
          azd auth login \
            --client-id "${{ secrets.AZURE_CLIENT_ID }}" \
            --tenant-id "${{ secrets.AZURE_TENANT_ID }}" \
            --federated-credential-provider github

      - name: Verify az/azd auth
        shell: bash
        run: |
          set -euo pipefail
          az account show -o none
          az account get-access-token -o none
          command -v azd >/dev/null 2>&1
          azd version

      - name: "Sanity: environment variables (resolved)"
        shell: bash
        run: |
          echo "Using GitHub Environment: ${{ job.environment.name }}"
          echo "AZURE_ENV_NAME=$AZURE_ENV_NAME"
          echo "AZURE_RESOURCE_GROUP=$AZURE_RESOURCE_GROUP"
          echo "AZURE_ACR_NAME=$AZURE_ACR_NAME"
          echo "AZURE_ACR_RESOURCE_GROUP=$AZURE_ACR_RESOURCE_GROUP"

      - name: Enable azd alpha features (deployment stacks)
        run: azd config set alpha.deployment.stacks on

      - name: Ensure AZURE_ENV_NAME default
        run: |
          if [ -z "$AZURE_ENV_NAME" ]; then
            NAME="${GITHUB_REF_NAME:-dev}"
            SAFE=$(echo "$NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g')
            echo "AZURE_ENV_NAME=$SAFE" >> $GITHUB_ENV
            echo "Using fallback AZURE_ENV_NAME: $SAFE"
          else
            echo "Using provided AZURE_ENV_NAME: $AZURE_ENV_NAME"
          fi

      - name: Prepare azd environment
        run: |
          azd env new $AZURE_ENV_NAME --no-prompt || true
          azd env set AZURE_ENV_NAME "$AZURE_ENV_NAME"
          azd env set AZURE_RESOURCE_GROUP "$AZURE_RESOURCE_GROUP"
          if [ -n "$AZURE_ACR_RESOURCE_GROUP" ]; then
            azd env set AZURE_ACR_RESOURCE_GROUP "$AZURE_ACR_RESOURCE_GROUP"
          fi
          # Derive location from the resource group and set it for preprovision scripts
          RG_LOC=$(az group show -n "$AZURE_RESOURCE_GROUP" --query location -o tsv 2>/dev/null || true)
          if [ -n "$RG_LOC" ]; then
            echo "Resolved location from RG '$AZURE_RESOURCE_GROUP': $RG_LOC"
            azd env set AZURE_LOCATION "$RG_LOC"
          else
            echo "Warning: Could not resolve location for RG '$AZURE_RESOURCE_GROUP'"
          fi
          azd env set AZURE_ACR_NAME "$AZURE_ACR_NAME"
          azd env set AZURE_SUBSCRIPTION_ID "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          
          # Set Key Vault name if provided (optional - preprovision script will calculate if not set)
          if [ -n "$KEY_VAULT_NAME" ]; then
            azd env set KEY_VAULT_NAME "$KEY_VAULT_NAME"
            echo "Using provided KEY_VAULT_NAME: $KEY_VAULT_NAME"
          else
            echo "KEY_VAULT_NAME not set - preprovision script will calculate it"
          fi
          
          # Set Key Vault Secrets - Required for backend authentication
          if [ -n "${{ secrets.OIDC_CLIENT_SECRET || '' }}" ]; then
            azd env set OIDC_CLIENT_SECRET "${{ secrets.OIDC_CLIENT_SECRET }}"
            echo "✓ OIDC_CLIENT_SECRET configured"
          fi
          
          if [ -n "${{ secrets.JWT_SECRET || '' }}" ]; then
            azd env set JWT_SECRET "${{ secrets.JWT_SECRET }}"
            echo "✓ JWT_SECRET configured"
          fi
          
          # Set SQL Admin Password - Required for SQL Server resource in main.bicep
          # This is a @secure() Bicep parameter that requires a value in non-interactive mode (--no-prompt).
          # Used only for SQL Server admin account; backend application uses passwordless managed identity.
          if [ -n "${{ secrets.SQL_ADMIN_PASSWORD || '' }}" ]; then
            azd env set SQL_ADMIN_PASSWORD "${{ secrets.SQL_ADMIN_PASSWORD }}"
          elif [ -n "${{ vars.SQL_ADMIN_PASSWORD || '' }}" ]; then
            azd env set SQL_ADMIN_PASSWORD "${{ vars.SQL_ADMIN_PASSWORD }}"
          else
            echo "WARNING: SQL_ADMIN_PASSWORD not set. Deployment may fail if SQL resources need to be updated."
          fi
          
          echo "DEBUG: SQL_AD_GROUP_NAME : ${{ vars.SQL_AD_GROUP_NAME || '' }}"
          echo "DEBUG: SQL_AD_GROUP_OBJECT_ID : ${{ vars.SQL_AD_GROUP_OBJECT_ID || '' }}"
          
          # Set SQL AD security group for human admin access at database level.
          # The dedicated SQL admin managed identity (created by Bicep) is the server-level AD admin.
          # The AD group gets db_owner on the database via deployment script — no Directory Readers needed.
          if [ -n "${{ vars.SQL_AD_GROUP_NAME || '' }}" ]; then
            azd env set SQL_AD_GROUP_NAME "${{ vars.SQL_AD_GROUP_NAME }}"
            echo "✓ SQL_AD_GROUP_NAME configured"
          fi
          if [ -n "${{ vars.SQL_AD_GROUP_OBJECT_ID || '' }}" ]; then
            azd env set SQL_AD_GROUP_OBJECT_ID "${{ vars.SQL_AD_GROUP_OBJECT_ID }}"
            echo "✓ SQL_AD_GROUP_OBJECT_ID configured"
          fi
          
          # Set OIDC Provider Configuration - Required for OAuth2/OpenID Connect authentication
          # Public endpoints are stored as GitHub environment variables (not secrets)
          # PKCE authentication is used (no client secret required for public clients)
          if [ -n "${{ vars.OIDC_AUTHORIZATION_ENDPOINT || '' }}" ]; then
            azd env set OIDC_AUTHORIZATION_ENDPOINT "${{ vars.OIDC_AUTHORIZATION_ENDPOINT }}"
            echo "✓ OIDC_AUTHORIZATION_ENDPOINT configured"
          fi
          
          if [ -n "${{ vars.OIDC_TOKEN_ENDPOINT || '' }}" ]; then
            azd env set OIDC_TOKEN_ENDPOINT "${{ vars.OIDC_TOKEN_ENDPOINT }}"
            echo "✓ OIDC_TOKEN_ENDPOINT configured"
          fi
          
          if [ -n "${{ vars.OIDC_USER_INFO_ENDPOINT || '' }}" ]; then
            azd env set OIDC_USER_INFO_ENDPOINT "${{ vars.OIDC_USER_INFO_ENDPOINT }}"
            echo "✓ OIDC_USER_INFO_ENDPOINT configured"
          fi
          
          if [ -n "${{ vars.OIDC_JWK_SET_URI || '' }}" ]; then
            azd env set OIDC_JWK_SET_URI "${{ vars.OIDC_JWK_SET_URI }}"
            echo "✓ OIDC_JWK_SET_URI configured"
          fi
          
          if [ -n "${{ vars.OIDC_END_SESSION_ENDPOINT || '' }}" ]; then
            azd env set OIDC_END_SESSION_ENDPOINT "${{ vars.OIDC_END_SESSION_ENDPOINT }}"
            echo "✓ OIDC_END_SESSION_ENDPOINT configured"
          fi
          
          if [ -n "${{ vars.OIDC_CLIENT_ID || '' }}" ]; then
            azd env set OIDC_CLIENT_ID "${{ vars.OIDC_CLIENT_ID }}"
            echo "✓ OIDC_CLIENT_ID configured (using PKCE - no client secret needed)"
          fi
          
          # Set individual OIDC additional parameters (simpler than JSON parsing)
          if [ -n "${{ vars.OIDC_ADDL_REQ_PARAM_ACR_VALUES || '' }}" ]; then
            azd env set OIDC_ADDL_REQ_PARAM_ACR_VALUES "${{ vars.OIDC_ADDL_REQ_PARAM_ACR_VALUES }}"
            echo "✓ OIDC_ADDL_REQ_PARAM_ACR_VALUES configured"
          fi
          
          if [ -n "${{ vars.OIDC_ADDL_REQ_PARAM_PROMPT || '' }}" ]; then
            azd env set OIDC_ADDL_REQ_PARAM_PROMPT "${{ vars.OIDC_ADDL_REQ_PARAM_PROMPT }}"
            echo "✓ OIDC_ADDL_REQ_PARAM_PROMPT configured"
          fi
          
          if [ -n "${{ vars.OIDC_ADDL_REQ_PARAM_RESPONSE_TYPE || '' }}" ]; then
            azd env set OIDC_ADDL_REQ_PARAM_RESPONSE_TYPE "${{ vars.OIDC_ADDL_REQ_PARAM_RESPONSE_TYPE }}"
            echo "✓ OIDC_ADDL_REQ_PARAM_RESPONSE_TYPE configured"
          fi
          
          # Set Azure AD (Entra ID) Configuration - Required for internal SSO authentication
          # Only tenantId, clientId, clientSecret needed; endpoints are derived from tenant ID in Bicep and Spring Boot
          # Note: AZURE_TENANT_ID is reused from the existing repo secret (same tenant for Azure CLI login and AAD SSO)
          if [ -n "${{ vars.AZURE_AD_CLIENT_ID || '' }}" ]; then
            azd env set AZURE_AD_CLIENT_ID "${{ vars.AZURE_AD_CLIENT_ID }}"
            echo "✓ AZURE_AD_CLIENT_ID configured"
          fi
          
          if [ -n "${{ secrets.AZURE_TENANT_ID || '' }}" ]; then
            azd env set AZURE_AD_TENANT_ID "${{ secrets.AZURE_TENANT_ID }}"
            echo "✓ AZURE_AD_TENANT_ID configured (from AZURE_TENANT_ID secret)"
          fi
          
          if [ -n "${{ secrets.AZURE_AD_CLIENT_SECRET || '' }}" ]; then
            azd env set AZURE_AD_CLIENT_SECRET "${{ secrets.AZURE_AD_CLIENT_SECRET }}"
            echo "✓ AZURE_AD_CLIENT_SECRET configured"
          fi
          
          # Set Custom Domain configuration (optional - for DNS zone and TLS binding)
          if [ -n "${{ vars.CUSTOM_DOMAIN_NAME || '' }}" ]; then
            azd env set CUSTOM_DOMAIN_NAME "${{ vars.CUSTOM_DOMAIN_NAME }}"
            echo "✓ CUSTOM_DOMAIN_NAME configured: ${{ vars.CUSTOM_DOMAIN_NAME }}"
          fi
          if [ -n "${{ vars.ENABLE_AZURE_DNS || '' }}" ]; then
            azd env set ENABLE_AZURE_DNS "${{ vars.ENABLE_AZURE_DNS }}"
            echo "✓ ENABLE_AZURE_DNS configured: ${{ vars.ENABLE_AZURE_DNS }}"
          fi

          # Set VNet integration flag (controls private endpoints for SQL, App Config, Key Vault)
          if [ -n "${{ vars.ENABLE_VNET_INTEGRATION || '' }}" ]; then
            azd env set ENABLE_VNET_INTEGRATION "${{ vars.ENABLE_VNET_INTEGRATION }}"
            echo "✓ ENABLE_VNET_INTEGRATION configured: ${{ vars.ENABLE_VNET_INTEGRATION }}"
          fi

      - name: Ensure ACR exists (preprovision)
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/ensure-acr.sh
          ./scripts/ensure-acr.sh

      - name: Ensure DNS Zone exists (preprovision)
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/ensure-dns-zone.sh

      - name: Resolve images (preprovision)
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/resolve-images.sh
          ./scripts/resolve-images.sh

      - name: Validate image vs ACR binding (guard)
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/validate-acr-binding.sh
          ./scripts/validate-acr-binding.sh

      - name: Provision infrastructure (azd provision)
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🏗️  Provisioning shared infrastructure and all services"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "This workflow provisions:"
          echo "  - Azure Container Registry (if not exists)"
          echo "  - Azure Key Vault (if not exists)"
          echo "  - Container Apps Environment"
          echo "  - Log Analytics Workspace"
          echo "  - Application Insights"
          echo "  - Frontend Container App (dev-rap-fe)"
          echo "  - Backend Container App (dev-rap-be)"
          echo "  - Processes Container App (dev-rap-proc)"
          echo "  - Azure SQL Server and Database"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          azd provision --no-prompt --environment "$AZURE_ENV_NAME"

      # FQDN propagation (FRONTEND_URL, BACKEND_CORS_ALLOWED_ORIGINS) is now
      # handled by the postprovision hook in azure.yaml, which runs automatically
      # after every `azd provision` — no separate step needed.

      # SQL permissions are now granted automatically by the Bicep deployment script
      # (modules/sql-role-assignments.bicep) — no manual extraction needed.

      - name: Show deployment summary
        if: success()
        shell: bash
        run: |
          echo "✅ Infrastructure provisioning completed successfully!"
          echo ""
          echo "📊 Deployed Resources:"
          
          # Get Container Apps
          APPS=$(az containerapp list -g "$AZURE_RESOURCE_GROUP" --query "[].{Name:name,Status:properties.provisioningState,Fqdn:properties.configuration.ingress.fqdn}" -o tsv 2>/dev/null || true)
          
          if [ -n "$APPS" ]; then
            echo ""
            echo "Container Apps:"
            echo "$APPS" | while IFS=$'\t' read -r name status fqdn; do
              echo "  - $name"
              echo "    Status: $status"
              if [ -n "$fqdn" ] && [ "$fqdn" != "null" ]; then
                echo "    URL: https://$fqdn"
              fi
            done
          fi
          
          # Get ACR
          ACR_INFO=$(az acr show -n "$AZURE_ACR_NAME" -g "${AZURE_ACR_RESOURCE_GROUP:-$AZURE_RESOURCE_GROUP}" --query "{Name:name,LoginServer:loginServer,Sku:sku.name}" -o tsv 2>/dev/null || true)
          if [ -n "$ACR_INFO" ]; then
            echo ""
            echo "Container Registry:"
            echo "$ACR_INFO" | while IFS=$'\t' read -r name login sku; do
              echo "  - $name ($sku)"
              echo "    Login Server: $login"
            done
          fi
          
          {
            echo "### 🏗️ Infrastructure Provisioning Complete"
            echo ""
            echo "**Environment**: $AZURE_ENV_NAME"
            echo "**Resource Group**: $AZURE_RESOURCE_GROUP"
            echo ""
            if [ -n "$APPS" ]; then
              echo "**Container Apps**:"
              echo "$APPS" | while IFS=$'\t' read -r name status fqdn; do
                echo "- **$name**: $status"
                if [ -n "$fqdn" ] && [ "$fqdn" != "null" ]; then
                  echo "  - URL: https://$fqdn"
                  
                  # Add OIDC redirect URI info for backend
                  if [[ "$name" == *"-be" ]]; then
                    echo "  - **OIDC Redirect URI**: \`https://$fqdn/login/oauth2/code/oidc-provider\`"
                  fi
                fi
              done
            fi
            
            # Add OIDC Provider Configuration section
            BACKEND_FQDN=$(az containerapp show -n "${AZURE_ENV_NAME}-rap-be" -g "$AZURE_RESOURCE_GROUP" --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || true)
            if [ -n "$BACKEND_FQDN" ] && [ "$BACKEND_FQDN" != "null" ]; then
              echo ""
              echo "---"
              echo ""
              echo "### 🔐 OIDC Provider Configuration"
              echo ""
              echo "**⚠️ MANUAL ACTION NEEDED**: Update your OIDC provider settings with the following redirect URI."
              echo ""
              echo "**Instructions**:"
              echo "1. Log in to your OIDC provider's admin console"
              echo "2. Navigate to your application/client configuration"
              echo "3. Add or update the **Redirect URI** / **Callback URL**:"
              echo ""
              echo "   \`\`\`"
              echo "   https://$BACKEND_FQDN/login/oauth2/code/oidc-provider"
              echo "   \`\`\`"
              echo ""
              echo "4. Save the configuration"
              echo ""
              echo "**Note**: The redirect URI must exactly match the URL above (including the path). Most OIDC providers require this to be configured before authentication will work."
              echo ""
              echo "**Example OIDC Providers**:"
              echo "- **Identity Sandbox**: Update in your application settings at identity sandbox admin console"
              echo "- **Keycloak**: Client Settings → Valid Redirect URIs"
              echo "- **Azure AD**: App Registration → Authentication → Redirect URIs"
              echo "- **Okta**: Applications → [Your App] → General → Login → Redirect URIs"
              echo "- **Auth0**: Applications → [Your App] → Settings → Allowed Callback URLs"
            fi
            
            # Add Azure AD (Entra ID) Configuration section
            if [ -z "$BACKEND_FQDN" ]; then
              BACKEND_FQDN=$(az containerapp show -n "${AZURE_ENV_NAME}-rap-be" -g "$AZURE_RESOURCE_GROUP" --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || true)
            fi
            FRONTEND_FQDN=$(az containerapp show -n "${AZURE_ENV_NAME}-rap-fe" -g "$AZURE_RESOURCE_GROUP" --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || true)
            if [ -n "$BACKEND_FQDN" ] && [ "$BACKEND_FQDN" != "null" ]; then
              echo ""
              echo "---"
              echo ""
              echo "### 🔐 Azure AD (Entra ID) Configuration"
              echo ""
              echo "**⚠️ MANUAL ACTION NEEDED**: Update the Azure AD App Registration with the following redirect URIs."
              echo ""
              echo "**Instructions**:"
              echo "1. Go to [Azure Portal → Entra ID → App Registrations](https://portal.azure.com/#view/Microsoft_AAD_IAM/ActiveDirectoryMenuBlade/~/RegisteredApps)"
              echo "2. Select your app registration (client ID from \`AZURE_AD_CLIENT_ID\`)"
              echo "3. Go to **Authentication** → **Platform configurations** → **Web**"
              echo "4. Add or update the following **Redirect URIs**:"
              echo ""
              echo "   | Purpose | URI |"
              echo "   |---------|-----|"
              echo "   | OAuth2 callback | \`https://$BACKEND_FQDN/login/oauth2/code/azure-ad\` |"
              if [ -n "$FRONTEND_FQDN" ] && [ "$FRONTEND_FQDN" != "null" ]; then
              echo "   | Post-logout redirect | \`https://$FRONTEND_FQDN/sign-in?logout=success\` |"
              fi
              echo ""
              echo "5. Under **Front-channel logout URL** (optional):"
              echo ""
              echo "   \`\`\`"
              if [ -n "$FRONTEND_FQDN" ] && [ "$FRONTEND_FQDN" != "null" ]; then
              echo "   https://$FRONTEND_FQDN/sign-in?logout=success"
              fi
              echo "   \`\`\`"
              echo ""
              echo "6. Save the configuration"
              echo ""
              echo "**Note**: These URIs change whenever the Container Apps Environment is recreated. Consider using a custom domain for stable URIs."
            fi
            
            # SQL permissions status
            echo ""
            echo "---"
            echo ""
            echo "### 🔐 SQL Database Permissions"
            echo ""
            echo "✅ SQL database permissions were granted automatically by the deployment script."
            echo "   A dedicated managed identity (\`id-sqladmin-*\`) is the SQL AD admin and ran"
            echo "   CREATE USER + GRANT ROLE for all service identities during provisioning."
            if [ -n "${{ vars.SQL_AD_GROUP_NAME || '' }}" ]; then
              echo "   AD group \`${{ vars.SQL_AD_GROUP_NAME }}\` was granted db_owner for portal admin access."
            fi
          } >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Infrastructure provisioning failed!"
          echo "Check the logs above for error details."
          echo ""
          echo "Common issues:"
          echo "  - Deployment stack in non-terminal state (another deployment running)"
          echo "  - Invalid Bicep configuration"
          echo "  - Missing permissions"
          echo "  - Resource quota limits"
