name: Promote Frontend Image

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Full image with digest (e.g., myacr.azurecr.io/raptor/frontend-dev@sha256:...)"
        required: true
      sourceRepo:
        description: "GitHub owner/repo of the frontend source (auto-detected if empty)"
        required: false
  repository_dispatch:
    types: [ frontend-image-promote ]

jobs:
  promote:
    uses: ./.github/workflows/_promote-image.yaml
    secrets: inherit
    with:
      service-key:    frontend
      service-suffix: fe
      service-label:  Frontend
      image:       ${{ github.event.client_payload.image || inputs.image }}
      source-repo: ${{ github.event.client_payload.sourceRepo || inputs.sourceRepo || '' }}