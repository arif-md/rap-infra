name: Promote Infrastructure

# Provisions Azure infrastructure (azd up) sequentially across environments.
# Use this when Bicep changes have been deployed to dev and need to propagate forward.
# Image promotion (container image updates) is handled by promote-{service}.yaml, not this workflow.
#
# ── Trigger model ────────────────────────────────────────────────────────────
# Automatic: fires when "Provision Infrastructure" completes successfully on main.
#   dev is already done by that workflow; this promotes test → train.
#   Prod is intentionally excluded from auto-trigger — it always requires explicit
#   manual dispatch with run-prod=true.
#
# Manual (workflow_dispatch): select which environments to provision. Useful for
#   re-running a single failed environment, force-provisioning prod, or targeted rollout.
#
# ── Approval gates (industry standard) ───────────────────────────────────────
# The gate is NOT the trigger — it is the GitHub Environment protection rule.
# Configure "Required reviewers" on the test, train, and prod GitHub Environments.
# The workflow fires automatically but pauses at each environment waiting for a
# human to approve. Reject the approval to discard the promotion. This matches the
# Azure DevOps multi-stage pipeline model and how _promote-image.yaml works here.
#
# Environment order: dev → test → train → prod
# Each environment must have AZURE_ACR_NAME, AZURE_RESOURCE_GROUP,
# AZURE_SUBSCRIPTION_ID, AZURE_CLIENT_ID, AZURE_TENANT_ID configured.

on:
  # Auto-chain after dev provision succeeds
  workflow_run:
    workflows: ["Provision Infrastructure"]
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      run-test:
        description: "Provision test environment"
        type: boolean
        default: true
      run-train:
        description: "Provision train environment"
        type: boolean
        default: true
      run-prod:
        description: "Provision prod environment"
        type: boolean
        default: false

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # TEST
  # ────────────────────────────────────────────────────────────────────────────
  provision-test:
    name: Provision test
    # Auto-trigger: only when the dev provision succeeded.
    # Manual: respect the run-test checkbox.
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && inputs.run-test == true)
    runs-on: ubuntu-latest
    environment: test
    concurrency:
      group: azure-deployment-test
      cancel-in-progress: false
    env:
      AZURE_ENV_NAME:          ${{ vars.AZURE_ENV_NAME || 'test' }}
      AZURE_RESOURCE_GROUP:    ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_ACR_NAME:          ${{ vars.AZURE_ACR_NAME }}
      AZURE_ACR_RESOURCE_GROUP: ${{ vars.AZURE_ACR_RESOURCE_GROUP || '' }}
      KEY_VAULT_NAME:          ${{ vars.KEY_VAULT_NAME || '' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Azure Developer CLI
        uses: Azure/setup-azd@v2
        with:
          version: latest
        continue-on-error: true

      - name: Ensure azd installed (fallback)
        run: |
          if ! command -v azd >/dev/null 2>&1; then
            curl -fsSL https://aka.ms/install-azd.sh | bash
            echo "$HOME/.azure-dev/bin" >> $GITHUB_PATH
          fi
          azd version

      - name: azd auth login (OIDC)
        run: |
          azd auth login \
            --client-id "${{ secrets.AZURE_CLIENT_ID }}" \
            --tenant-id "${{ secrets.AZURE_TENANT_ID }}" \
            --federated-credential-provider github

      - name: Prepare azd environment
        uses: ./.github/actions/setup-azd-env
        with:
          azure-env-name:        ${{ env.AZURE_ENV_NAME }}
          azure-resource-group:  ${{ env.AZURE_RESOURCE_GROUP }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          all-vars-json:    ${{ toJson(vars) }}
          all-secrets-json: ${{ toJson(secrets) }}

      - name: Skip role assignments on re-provision
        shell: bash
        run: |
          # These role assignments already exist from the initial provision.
          # Promote always re-provisions an existing environment, so we skip
          # re-creating them to avoid RoleAssignmentExists (ARM 409) which
          # Azure Deployment Stacks cannot handle idempotently for resources
          # created outside the current stack.
          azd env set SKIP_APP_CONFIG_ROLE_ASSIGNMENT true
          azd env set SKIP_SQL_SERVER_ROLE_ASSIGNMENT true

      - name: Run preprovision hooks
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/ensure-acr.sh scripts/resolve-images.sh scripts/validate-acr-binding.sh
          ./scripts/ensure-acr.sh
          ./scripts/resolve-images.sh
          ./scripts/validate-acr-binding.sh

      - name: Provision infrastructure
        run: azd up --no-prompt

  after-test:
    name: Barrier after test
    if: ${{ always() }}
    needs: [provision-test]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Test provisioning complete — proceeding to train"

  # ────────────────────────────────────────────────────────────────────────────
  # TRAIN
  # ────────────────────────────────────────────────────────────────────────────
  provision-train:
    name: Provision train
    # Auto-trigger: only when the dev provision succeeded.
    # Manual: respect the run-train checkbox.
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && inputs.run-train == true)
    needs: [after-test]
    runs-on: ubuntu-latest
    environment: train
    concurrency:
      group: azure-deployment-train
      cancel-in-progress: false
    env:
      AZURE_ENV_NAME:          ${{ vars.AZURE_ENV_NAME || 'train' }}
      AZURE_RESOURCE_GROUP:    ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_ACR_NAME:          ${{ vars.AZURE_ACR_NAME }}
      AZURE_ACR_RESOURCE_GROUP: ${{ vars.AZURE_ACR_RESOURCE_GROUP || '' }}
      KEY_VAULT_NAME:          ${{ vars.KEY_VAULT_NAME || '' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Azure Developer CLI
        uses: Azure/setup-azd@v2
        with:
          version: latest
        continue-on-error: true

      - name: Ensure azd installed (fallback)
        run: |
          if ! command -v azd >/dev/null 2>&1; then
            curl -fsSL https://aka.ms/install-azd.sh | bash
            echo "$HOME/.azure-dev/bin" >> $GITHUB_PATH
          fi
          azd version

      - name: azd auth login (OIDC)
        run: |
          azd auth login \
            --client-id "${{ secrets.AZURE_CLIENT_ID }}" \
            --tenant-id "${{ secrets.AZURE_TENANT_ID }}" \
            --federated-credential-provider github

      - name: Prepare azd environment
        uses: ./.github/actions/setup-azd-env
        with:
          azure-env-name:        ${{ env.AZURE_ENV_NAME }}
          azure-resource-group:  ${{ env.AZURE_RESOURCE_GROUP }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          all-vars-json:    ${{ toJson(vars) }}
          all-secrets-json: ${{ toJson(secrets) }}

      - name: Skip role assignments on re-provision
        shell: bash
        run: |
          # These role assignments already exist from the initial provision.
          # Promote always re-provisions an existing environment, so we skip
          # re-creating them to avoid RoleAssignmentExists (ARM 409) which
          # Azure Deployment Stacks cannot handle idempotently for resources
          # created outside the current stack.
          azd env set SKIP_APP_CONFIG_ROLE_ASSIGNMENT true
          azd env set SKIP_SQL_SERVER_ROLE_ASSIGNMENT true

      - name: Run preprovision hooks
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/ensure-acr.sh scripts/resolve-images.sh scripts/validate-acr-binding.sh
          ./scripts/ensure-acr.sh
          ./scripts/resolve-images.sh
          ./scripts/validate-acr-binding.sh

      - name: Provision infrastructure
        run: azd up --no-prompt

  after-train:
    name: Barrier after train
    if: ${{ always() }}
    needs: [provision-train]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Train provisioning complete — proceeding to prod"

  # ────────────────────────────────────────────────────────────────────────────
  # PROD
  # ────────────────────────────────────────────────────────────────────────────
  provision-prod:
    name: Provision prod
    # Prod is NEVER auto-triggered — always requires explicit manual dispatch with run-prod=true.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run-prod == true }}
    needs: [after-train]
    runs-on: ubuntu-latest
    environment: prod
    concurrency:
      group: azure-deployment-prod
      cancel-in-progress: false
    env:
      AZURE_ENV_NAME:          ${{ vars.AZURE_ENV_NAME || 'prod' }}
      AZURE_RESOURCE_GROUP:    ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_ACR_NAME:          ${{ vars.AZURE_ACR_NAME }}
      AZURE_ACR_RESOURCE_GROUP: ${{ vars.AZURE_ACR_RESOURCE_GROUP || '' }}
      KEY_VAULT_NAME:          ${{ vars.KEY_VAULT_NAME || '' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Azure Developer CLI
        uses: Azure/setup-azd@v2
        with:
          version: latest
        continue-on-error: true

      - name: Ensure azd installed (fallback)
        run: |
          if ! command -v azd >/dev/null 2>&1; then
            curl -fsSL https://aka.ms/install-azd.sh | bash
            echo "$HOME/.azure-dev/bin" >> $GITHUB_PATH
          fi
          azd version

      - name: azd auth login (OIDC)
        run: |
          azd auth login \
            --client-id "${{ secrets.AZURE_CLIENT_ID }}" \
            --tenant-id "${{ secrets.AZURE_TENANT_ID }}" \
            --federated-credential-provider github

      - name: Prepare azd environment
        uses: ./.github/actions/setup-azd-env
        with:
          azure-env-name:        ${{ env.AZURE_ENV_NAME }}
          azure-resource-group:  ${{ env.AZURE_RESOURCE_GROUP }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          all-vars-json:    ${{ toJson(vars) }}
          all-secrets-json: ${{ toJson(secrets) }}

      - name: Skip role assignments on re-provision
        shell: bash
        run: |
          # These role assignments already exist from the initial provision.
          # Promote always re-provisions an existing environment, so we skip
          # re-creating them to avoid RoleAssignmentExists (ARM 409) which
          # Azure Deployment Stacks cannot handle idempotently for resources
          # created outside the current stack.
          azd env set SKIP_APP_CONFIG_ROLE_ASSIGNMENT true
          azd env set SKIP_SQL_SERVER_ROLE_ASSIGNMENT true

      - name: Run preprovision hooks
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/ensure-acr.sh scripts/resolve-images.sh scripts/validate-acr-binding.sh
          ./scripts/ensure-acr.sh
          ./scripts/resolve-images.sh
          ./scripts/validate-acr-binding.sh

      - name: Provision infrastructure
        run: azd up --no-prompt
