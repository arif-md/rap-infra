name: raptor
infra:
  provider: bicep
  path: .
  deploymentStacks:
    # On azd down, delete managed resources but keep the resource group intact
    # Key Vault is NOT in deployment stack (created by preprovision script), so it won't be deleted
    actionOnUnmanage:
      resources: delete
      resourceGroups: detach
    denySettings:
      mode: none

hooks:
  preprovision:
    windows:
      shell: pwsh
      run: ./scripts/run-preprovision-hooks.ps1
      interactive: false
    posix:
      shell: sh
      run: ./scripts/run-preprovision-hooks.sh
      interactive: false
  postprovision:
    windows:
      shell: pwsh
      run: ./scripts/bind-custom-domain-tls.ps1
      interactive: false
    posix:
      shell: sh
      run: ./scripts/bind-custom-domain-tls.sh
      interactive: false
  # Legacy postprovision hook removed — no longer needed.
  # CORS and frontend URL are now computed in-deployment via computedFrontendUrl
  # (derived from containerAppsEnvironment.properties.defaultDomain) and pushed
  # to App Config + container env vars in a single provision pass.
  # See scripts/postprovision-update-fqdns.ps1 for the legacy implementation.

services:
